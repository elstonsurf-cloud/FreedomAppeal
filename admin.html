<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Shirt Shop</title>
    <link rel="stylesheet" href="styles.css?v=12">
  </head>
  <body>
    <header class="store-nav">
      <nav aria-label="Shop navigation">
        <a href="index.html#items-title">Shop</a>
        <a class="cart-nav-link" href="cart.html">Cart <span class="cart-badge" data-cart-badge>0</span></a>
      </nav>
    </header>

    <main class="page">
      <section id="admin-panel" class="card admin-card" aria-labelledby="admin-title">
        <div class="section-heading">
          <div>
            <p class="kicker">Backdoor</p>
            <h1 id="admin-title">Manage Items</h1>
            <p>Add shop items and their options. Changes save in this browser.</p>
          </div>
        </div>

        <form id="item-form" class="admin-form">
          <input type="hidden" name="itemId">

          <label>
            Item name
            <input name="itemName" placeholder="Team T-Shirt" required>
          </label>

          <label>
            Image URLs
            <textarea name="itemImageUrls" rows="4" placeholder="One image per line&#10;images/team-shirt-front.jpg&#10;images/team-shirt-back.jpg"></textarea>
            <span class="help-text">Repo images or direct image links work best.</span>
          </label>

          <label>
            Color preview images
            <textarea name="itemColorImages" rows="5" placeholder="Match color options to images&#10;Navy: images/navy-shirt.jpg&#10;White: images/white-shirt.jpg"></textarea>
            <span class="help-text">Color names should match your Color option values.</span>
          </label>

          <label>
            Description
            <textarea name="itemDescription" rows="3" placeholder="Short note shown under the item name."></textarea>
          </label>

          <label>
            Base price
            <input type="number" name="itemBasePrice" min="0" step="0.01" placeholder="20.00">
          </label>

          <label>
            Option groups
            <textarea name="itemOptions" rows="7" placeholder="Size: Youth S, Youth M, Adult S, Adult M&#10;Color: Navy, White&#10;Print: Front only, Front and back"></textarea>
          </label>

          <label>
            Option price adjustments
            <textarea name="itemOptionPrices" rows="5" placeholder="Size: Adult 2XL +3&#10;Print: Front and back +5"></textarea>
            <span class="help-text">Use one line per price change. Example: Size: Adult 2XL +3</span>
          </label>

          <div class="button-row no-margin">
            <button class="button primary" type="submit" id="save-item">Add item</button>
            <button class="button quiet" type="button" id="cancel-edit" hidden>Cancel edit</button>
          </div>
          <p id="admin-message" class="message" role="status" aria-live="polite"></p>
        </form>

        <div class="admin-tools">
          <button class="button quiet" type="button" id="export-catalog">Export catalog</button>
          <button class="button quiet" type="button" id="reset-catalog">Reset defaults</button>
        </div>

        <label class="import-box">
          Import catalog JSON
          <textarea id="import-catalog-json" rows="5" placeholder="Paste exported catalog JSON here."></textarea>
        </label>
        <button class="button quiet" type="button" id="import-catalog">Import catalog</button>

        <div id="admin-items" class="admin-items"></div>
      </section>
    </main>

    <script src="app.js?v=12"></script>
  </body>
</html>
